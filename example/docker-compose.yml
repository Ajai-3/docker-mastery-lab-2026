version: '3.8'

services:
  # The Database Service
  mongo-db:
    image: mongo:latest
    container_name: example-mongodb
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - example-network

  # The Web Application Service
  web-app:
    build: .
    container_name: example-node-app
    restart: always
    ports:
      - "8080:3000"
    environment:
      - MONGO_URI=mongodb://mongo-db:27017/myapp
    depends_on:
      - mongo-db
    networks:
      - example-network

# Define the Volumes
volumes:
  mongo-data:

# Define the Networks
networks:
  example-network:
    driver: bridge
